<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>JBricks - Venda para todos!</title>

    <meta name="description"
        content="Cadastro para participação da comunidade JBricks">

    <link rel="icon" href="img/favicon.png">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- ===========================
         PEÇAS DECORATIVAS
    ============================ -->

    <img src="img/brick-red.png"
        class="brick brick-top-left"
        alt="">

    <img src="img/brick-yellow.png"
        class="brick brick-top-right"
        alt="">

    <img src="img/brick-blue.png"
        class="brick brick-bottom-left"
        alt="">

    <img src="img/brick-green.png"
        class="brick brick-bottom-right"
        alt="">


    <main class="landing">

        <!-- ===========================
                HERO
        ============================ -->

        <header class="hero">

            <div class="hero-logo">

                <img
                    src="img/logo-jbricks.png"
                    alt="JBricks">

            </div>

            <h1>

                JBricks - Venda para todos!

            </h1>

            <div class="hero-icon">

                ⛵

            </div>

            <p>

                Cadastre-se para participar da comunidade de compra e venda
                de produtos LEGO®.

            </p>

        </header>

        <!-- ===========================
                FORMULÁRIO
        ============================ -->

        <section class="card">

            <div class="card-header">

                <div class="icon-circle">

                    👤

                </div>

                <div>

                    <h2>Cadastro</h2>

                </div>

            </div>

            <form
                id="cadastroForm">

                <div class="form-grid">

                    <!-- Nome -->

                    <div class="form-group">

                        <label
                            for="nome">

                            Nome Completo *

                        </label>

                        <div class="input">

                            <span>

                                👤

                            </span>

                            <input
                                id="nome"
                                type="text"
                                placeholder="Digite seu nome completo">

                        </div>

                    </div>

                    <!-- CPF -->

                    <div class="form-group">

                        <label
                            for="cpf">

                            CPF *

                        </label>

                        <div class="input">

                            <span>

                                🪪

                            </span>

                            <input
                                id="cpf"
                                type="text"
                                placeholder="000.000.000-00">

                        </div>

                    </div>

                    <!-- WhatsApp -->

                    <div class="form-group">

                        <label
                            for="telefone">

                            WhatsApp *

                        </label>

                        <div class="input">

                            <span>

                                📱

                            </span>

                            <input
                                id="telefone"
                                type="text"
                                placeholder="(11) 99999-9999">

                        </div>

                    </div>

                    <!-- Data -->
					                    <div class="form-group">

                        <label
                            for="nascimento">

                            Data de Nascimento *

                        </label>

                        <div class="input">

                            <span>

                                📅

                            </span>

                            <input
                                id="nascimento"
                                name="nascimento"
                                type="date">

                        </div>

                        <small>

                            Você deve ter 18 anos ou mais para participar do grupo.

                        </small>

                    </div>

                </div>

                <!-- ALERTA -->

                <div
                    id="idadeErro"
                    class="alert alert-danger">

                    <span class="alert-icon">

                        ❌

                    </span>

                    <span>

                        Apenas maiores de 18 anos podem participar.

                    </span>

                </div>

                <!-- ACEITE -->

                <div class="accept">

                    <label class="accept-label">

                        <input
                            id="aceite"
                            name="aceite"
                            type="checkbox">

                        <span>

                            Declaro que li e aceito as regras da comunidade.

                        </span>

                    </label>

                </div>

                <!-- LINKS -->

                <div class="links">

                    <a
                        href="regras.html"
                        target="_blank">

                        📄 Regras do Grupo

                    </a>

                    <a
                        href="privacidade.html"
                        target="_blank">

                        🔒 Política de Privacidade

                    </a>

                </div>

                <!-- BOTÃO -->

                <div class="actions">

                    <button
                        id="btnCadastrar"
                        type="submit"
                        disabled>

                        <span>

                            Finalizar Cadastro

                        </span>

                        <span class="button-arrow">

                            ➜

                        </span>

                    </button>

                </div>

            </form>

        </section>

    </main>

    <script src="js/app.js"></script>

</body>

</html>
